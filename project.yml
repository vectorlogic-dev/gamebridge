name: GameBridge
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.argie
settings:
  base:
    SWIFT_VERSION: "6.0"
    # Self-signed local Dev identity ("GameBridge Dev") kept in the developer's
    # login keychain. Ad-hoc ("-") signing changes the cdhash on every rebuild
    # and drops TCC grants (Accessibility etc.) — this stable identity keeps
    # them across rebuilds. See ai/2026-07-01-hold-presser-issue.md for the
    # incident that motivated this.
    CODE_SIGN_IDENTITY: "GameBridge Dev"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: YES
    DEVELOPMENT_TEAM: ""
targets:
  GameBridge:
    type: application
    platform: macOS
    sources:
      - path: GameBridgeApp.swift
      - path: Models
      - path: Services
      - path: Views
      - path: scripts/rfbanana_handoff_patcher.py
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.argie.gamebridge
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: ""
  GameBridgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GameBridgeTests
    dependencies:
      - target: GameBridge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
